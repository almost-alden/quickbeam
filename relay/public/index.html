<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quickbeam | Sender Dashboard</title>
    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/images/icon-512.jpg">
    
    <!-- Modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 26, 45, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --primary-glow: rgba(139, 92, 246, 0.3);
            
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --success-border: rgba(16, 185, 129, 0.2);
            --success-text: #34d399;
            
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --warning-border: rgba(245, 158, 11, 0.2);
            --warning-text: #fbbf24;
            
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-border: rgba(239, 68, 68, 0.2);
            --error-text: #f87171;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Subtle glowing card accent */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #a5b4fc, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0 0 2rem;
            font-weight: 300;
        }

        .status-badge {
            margin-bottom: 2rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            text-align: left;
            line-height: 1.4;
            word-break: break-word;
        }

        .status-badge.loading {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }

        .status-badge.connected {
            background: var(--success-bg);
            border-color: var(--success-border);
            color: var(--success-text);
        }

        .status-badge.disconnected {
            background: var(--warning-bg);
            border-color: var(--warning-border);
            color: var(--warning-text);
        }

        .status-badge.error {
            background: var(--error-bg);
            border-color: var(--error-border);
            color: var(--error-text);
        }

        /* Ping pulse animation for connection status */
        .ping-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            position: relative;
            flex-shrink: 0;
            margin-top: 0.35rem;
        }
        
        .connected .ping-indicator { background-color: var(--success); }
        .disconnected .ping-indicator { background-color: var(--warning); }
        .loading .ping-indicator { background-color: var(--text-secondary); }

        .connected .ping-indicator::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.6rem;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(0, 0, 0, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .btn-primary {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--primary-glow);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        #result {
            margin-top: 2rem;
            display: none;
            padding: 1.25rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .link-container {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 0.5rem 0.5rem 0.5rem 1rem;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .link-text {
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
            color: var(--text-primary);
            font-size: 0.85rem;
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-btn.copied {
            background: var(--success-bg);
            border-color: var(--success-border);
            color: var(--success-text);
        }

        .copy-btn svg {
            transition: transform 0.2s ease;
        }

        .copy-btn.copied svg {
            transform: scale(1.1);
        }

        .copy-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Contacts directory styling */
        .contacts-section {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.25rem;
        }

        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .contact-btn {
            background: rgba(139, 92, 246, 0.06);
            border: 1px solid rgba(139, 92, 246, 0.15);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 0.75rem 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            position: relative;
            box-sizing: border-box;
        }

        .contact-btn:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-1px);
        }

        .contact-btn:active {
            transform: translateY(1px);
        }

        .contact-btn .delete-contact {
            position: absolute;
            top: 4px;
            right: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px;
            border-radius: 50%;
            display: inline-flex;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .contact-btn:hover .delete-contact {
            opacity: 1;
        }

        .contact-btn .delete-contact:hover {
            color: var(--error-text);
            background: rgba(239, 68, 68, 0.1);
        }

        .contact-initials {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.2);
            color: #c084fc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Quickbeam ⚡️</h1>
        <p>Send a video to a friend's Roku instantly.</p>

        <div id="roku-status" class="status-badge loading">
            <span class="ping-indicator"></span>
            <span>Checking Roku status...</span>
        </div>
        
        <label for="senderName">Your Name</label>
        <div class="input-group">
            <input type="text" id="senderName" placeholder="e.g. Johnny">
        </div>

        <label for="videoUrl">Video URL</label>
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Paste YouTube, Netflix, or Prime link">
        </div>

        <button class="btn-primary" onclick="generateLink()">
            <span>Create Magic Link</span>
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>

        <!-- Contacts Directory Section -->
        <div class="contacts-section">
            <label>Quick Send to Contact</label>
            <div id="contacts-container" class="contacts-grid">
                <!-- Rendered dynamically -->
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center;">
                <input type="text" id="newContactName" placeholder="Name (e.g. Mom)" style="padding: 0.6rem 0.8rem; font-size: 0.85rem; flex-grow: 1;">
                <input type="text" id="newContactCode" placeholder="TV Code (Optional)" style="padding: 0.6rem 0.8rem; font-size: 0.85rem; width: 120px;">
                <button class="copy-btn" onclick="saveContact()" style="padding: 0.6rem 1rem; font-size: 0.85rem; height: 38px;">+ Add</button>
            </div>
        </div>

        <div id="result">
            <label>Magic Link Ready!</label>
            <div class="link-container">
                <span class="link-text" id="outputLink"></span>
                <button class="copy-btn" id="copyBtn" onclick="copyLink()">
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" id="copyIcon"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <span>Copy</span>
                </button>
            </div>
            <div class="copy-hint">Copy this link and text it to your friend.</div>
        </div>
    </div>

    <div class="footer-links" style="margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: var(--text-secondary);">
        <a href="/privacy.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 1rem; transition: color 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-secondary)'">Privacy Policy</a>
        <a href="/terms.html" style="color: var(--text-secondary); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-secondary)'">Terms of Use</a>
    </div>

    <script>
        // Load saved sender name on startup
        document.getElementById('senderName').value = localStorage.getItem('quickbeam_sender_name') || '';

        // PWA Setup and Share Target Interception
        window.addEventListener('DOMContentLoaded', () => {
            // Parse Web Share Target API query params (e.g. from YouTube Share)
            const parsedUrl = new URL(window.location.href);
            const sharedUrl = parsedUrl.searchParams.get('url');
            const sharedText = parsedUrl.searchParams.get('text');
            
            let targetUrl = '';
            if (sharedUrl) {
                targetUrl = sharedUrl;
            } else if (sharedText) {
                // Extracts HTTP URLs embedded in share text (common in YouTube mobile share)
                const urlMatch = sharedText.match(/https?:\/\/[^\s]+/);
                if (urlMatch) {
                    targetUrl = urlMatch[0];
                } else {
                    targetUrl = sharedText;
                }
            }
            
            if (targetUrl) {
                document.getElementById('videoUrl').value = targetUrl;
            }
            
            // Register Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(() => console.log('[PWA] Service Worker Registered'))
                    .catch(err => console.error('[PWA] Service Worker Register Fail', err));
            }
            
            // Render contacts list
            renderContacts();
        });

        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const statusEl = document.getElementById('roku-status');
                const textEl = statusEl.querySelector('span:not(.ping-indicator)');
                
                if (data.active) {
                    statusEl.className = "status-badge connected";
                    textEl.innerText = "A Roku TV is active on your network!";
                } else {
                    statusEl.className = "status-badge disconnected";
                    textEl.innerText = "No Roku TV detected on your network. (Your detected public IP: " + data.publicIp + "). Recipient's phone must open the magic link on the same Wi-Fi to register their TV.";
                }
            } catch (e) {
                const statusEl = document.getElementById('roku-status');
                statusEl.className = "status-badge error";
                statusEl.querySelector('span:not(.ping-indicator)').innerText = "Unable to check Roku status.";
            }
        }

        async function generateLink() {
            const senderName = document.getElementById('senderName').value.trim();
            const url = document.getElementById('videoUrl').value.trim();
            
            if (!url) return alert("Please paste a URL");

            if (senderName) {
                localStorage.setItem('quickbeam_sender_name', senderName);
            } else {
                localStorage.removeItem('quickbeam_sender_name');
            }

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, senderName })
                });
                
                const data = await res.json();
                if (data.relayUrl) {
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('outputLink').innerText = data.relayUrl;
                } else {
                    alert("Error: " + (data.error || "Unknown error"));
                }
            } catch (e) {
                alert("Failed to connect to Relay server.");
            }
        }

        // Contact Management Logic
        function getContacts() {
            try {
                return JSON.parse(localStorage.getItem('quickbeam_contacts')) || [
                    { name: "Mom's Cell", code: "" }
                ];
            } catch (e) {
                return [];
            }
        }

        function saveContactsList(contacts) {
            localStorage.setItem('quickbeam_contacts', JSON.stringify(contacts));
        }

        function saveContact() {
            const nameInput = document.getElementById('newContactName');
            const codeInput = document.getElementById('newContactCode');
            const name = nameInput.value.trim();
            const code = codeInput.value.trim().replace(/\s+/g, '');

            if (!name) return alert("Please enter a contact name.");

            const contacts = getContacts();
            // Avoid duplicate name
            if (contacts.some(c => c.name.toLowerCase() === name.toLowerCase())) {
                return alert("A contact with this name already exists.");
            }

            contacts.push({ name, code });
            saveContactsList(contacts);

            nameInput.value = '';
            codeInput.value = '';
            renderContacts();
        }

        function deleteContact(index, event) {
            if (event) event.stopPropagation();
            if (!confirm("Are you sure you want to delete this contact?")) return;
            const contacts = getContacts();
            contacts.splice(index, 1);
            saveContactsList(contacts);
            renderContacts();
        }

        function renderContacts() {
            const container = document.getElementById('contacts-container');
            container.innerHTML = '';
            const contacts = getContacts();

            contacts.forEach((contact, index) => {
                const btn = document.createElement('div');
                btn.className = 'contact-btn';
                btn.onclick = () => sendToContact(contact);

                // Initials
                const initials = document.createElement('div');
                initials.className = 'contact-initials';
                initials.innerText = contact.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                btn.appendChild(initials);

                // Name text
                const nameSpan = document.createElement('span');
                nameSpan.innerText = contact.name;
                nameSpan.style.whiteSpace = 'nowrap';
                nameSpan.style.overflow = 'hidden';
                nameSpan.style.textOverflow = 'ellipsis';
                nameSpan.style.width = '100%';
                btn.appendChild(nameSpan);

                // Code indicator if pre-paired
                if (contact.code) {
                    const codeLabel = document.createElement('span');
                    codeLabel.innerText = "Code: " + contact.code;
                    codeLabel.style.fontSize = '0.65rem';
                    codeLabel.style.color = 'var(--text-secondary)';
                    btn.appendChild(codeLabel);
                }

                // Delete button
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-contact';
                delBtn.innerHTML = '<svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
                delBtn.onclick = (e) => deleteContact(index, e);
                btn.appendChild(delBtn);

                container.appendChild(btn);
            });
        }

        async function sendToContact(contact) {
            const url = document.getElementById('videoUrl').value.trim();
            const senderName = document.getElementById('senderName').value.trim();
            
            if (!url) return alert("Please paste a Video URL first.");
            
            if (senderName) {
                localStorage.setItem('quickbeam_sender_name', senderName);
            }

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, senderName, pairingCode: contact.code })
                });
                
                const data = await res.json();
                if (data.relayUrl) {
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('outputLink').innerText = data.relayUrl;
                    
                    // Trigger web sharing if supported
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: 'Quickbeam Link ⚡️',
                                text: `Hi ${contact.name}, ${senderName || 'Your friend'} sent you a video!`,
                                url: data.relayUrl
                            });
                        } catch (err) {
                            console.log('User dismissed share dialog', err);
                        }
                    } else {
                        await navigator.clipboard.writeText(data.relayUrl);
                        alert(`Magic Link generated and copied to clipboard!\nSend it to ${contact.name}:\n${data.relayUrl}`);
                    }
                } else {
                    alert("Error: " + (data.error || "Unknown error"));
                }
            } catch (e) {
                alert("Failed to connect to Relay server.");
            }
        }

        async function copyLink() {
            const linkText = document.getElementById('outputLink').innerText;
            try {
                await navigator.clipboard.writeText(linkText);
                const copyBtn = document.getElementById('copyBtn');
                const btnSpan = copyBtn.querySelector('span');
                const btnIcon = copyBtn.querySelector('svg');
                
                btnSpan.innerText = 'Copied!';
                copyBtn.classList.add('copied');
                btnIcon.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
                
                setTimeout(() => {
                    btnSpan.innerText = 'Copy';
                    copyBtn.classList.remove('copied');
                    btnIcon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>';
                }, 2000);
            } catch (e) {
                alert("Failed to copy link: " + e);
            }
        }

        checkStatus();
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
